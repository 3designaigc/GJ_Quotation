<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>國際採購下單系統 — Golden Jade Terre</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f2f5;color:#222;font-size:13px}
#app{max-width:1100px;margin:0 auto;padding:16px}
h1{font-size:18px;color:#1a3a5c;margin-bottom:14px}
#drop-zone{border:2px dashed #4a90d9;border-radius:8px;padding:24px;text-align:center;
  background:#EBF5FB;cursor:pointer;color:#2980b9;margin-bottom:12px;transition:.2s}
#drop-zone.over{background:#D4E8F7}
#drop-zone.loaded{background:#E8F6E8;border-color:#27ae60;color:#1e8449}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
label{font-weight:600;color:#555;font-size:12px}
input[type=date],input[type=text]{border:1px solid #ccc;border-radius:4px;padding:5px 7px;font-size:12px;margin-left:3px}
.btn{padding:7px 14px;border:none;border-radius:5px;font-size:12px;font-weight:700;cursor:pointer}
.btn-go{background:#1a3a5c;color:#fff}.btn-go:hover{background:#0f2540}
.btn-print{background:#27ae60;color:#fff}.btn-print:hover{background:#1e8449}
#order-info{background:#fff;border-left:4px solid #1a3a5c;padding:10px 14px;border-radius:6px;
  margin-bottom:10px;font-size:12px;display:none}
#config-row{display:none}
#po-wrapper{display:none;margin-top:16px}

/* ── PO Document ── */
.po-doc{font-family:Arial,sans-serif;font-size:8.5pt;background:#fff;padding:14px 18px;
  box-shadow:0 2px 10px rgba(0,0,0,.1);max-width:1060px;margin-bottom:20px}

/* PO Letterhead */
.po-letterhead{display:flex;align-items:center;justify-content:space-between;padding:0 0 10px;margin-bottom:10px;border-bottom:2.5px solid #1a3a5c}
.po-lh-left{display:flex;align-items:center;gap:10px}
.po-logo{width:42px;height:42px;border-radius:7px;flex-shrink:0}
.po-co-name{font-size:11pt;font-weight:800;color:#1a3a5c;line-height:1.3}
.po-co-addr{font-size:7.5pt;color:#555;line-height:1.5}
.po-lh-right{text-align:right}
.po-doc-title{font-size:14pt;font-weight:800;color:#1a3a5c;letter-spacing:.5px}
.po-doc-date{font-size:9pt;color:#555;margin-top:3px}
.date-top{display:none}
@media print{.po-letterhead{-webkit-print-color-adjust:exact;print-color-adjust:exact}}

.date-top{text-align:right;font-weight:700;margin-bottom:8px}
.po-grid2{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px}
.po-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:6px}
.po-grid12{display:grid;grid-template-columns:1fr 2fr;gap:6px;margin-bottom:6px}
.cell{border:1px solid #bbb;padding:5px 7px;font-size:8pt}
.cell-label{font-size:7pt;font-weight:700;color:#777;text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px}
.cell-title{font-weight:700;font-size:9.5pt;margin-bottom:2px}
.order-num{text-align:center;font-weight:700;padding:5px;background:#f5f7fa;border:1px solid #999;font-size:9pt}

table.pot{width:100%;border-collapse:collapse;font-size:7.5pt;margin-bottom:6px}
table.pot th{background:#1a3a5c;color:#fff;padding:4px 3px;text-align:center;
  border:1px solid #0f2540;font-size:7pt;line-height:1.3}
table.pot td{padding:3px 4px;border:1px solid #ccc;vertical-align:middle;text-align:center}
table.pot td.tl{text-align:left}
table.pot td.tr{text-align:right;font-family:'Courier New',monospace}
table.pot tr.tot-row{background:#EEF2F8;font-weight:700}
table.pot tr.tot-row td{border:1px solid #99a}

.tag-new{background:#E8F5E9;color:#2E7D32;border:1px solid #81C784;
  border-radius:3px;padding:0 3px;font-size:6.5pt;font-weight:700;margin-right:2px}
.remarks{font-size:7.5pt;margin-top:6px;line-height:1.5}
.remarks p{margin:1px 0}
.sig-grid{display:grid;grid-template-columns:1fr 1fr;gap:30px;margin-top:12px;
  border-top:1px solid #555;padding-top:8px}
.sig-block{font-size:8pt}
.sig-line{margin-top:22px;border-top:1px solid #888;padding-top:3px}
[contenteditable]{background:#FFFDE7}
[contenteditable]:focus{outline:2px solid #4a90d9;background:#FFF9C4}
.etd-line{margin-top:5px;font-weight:700}

@media print{
  body{background:#fff}
  #ctrl-panel{display:none!important}
  #po-wrapper{display:block!important}
  .po-doc{box-shadow:none;page-break-after:always}
  .po-doc:last-child{page-break-after:auto}
  [contenteditable]{background:transparent!important}
  @page{size:A4 landscape;margin:8mm 10mm}
}
</style>
</head>
<body>
<div id="app">

<!-- ── Control Panel ── -->
<div id="ctrl-panel">
  <h1>🌐 國際採購下單系統 — Golden Jade Terre</h1>

  <!-- ── 待辦訂單 Queue Panel ── -->
  <div id="gj-queue-panel" style="display:none;background:#fffbe6;border:2px solid #f39c12;border-radius:10px;padding:14px 18px;margin-bottom:16px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
      <span style="font-weight:700;font-size:15px;color:#7d5a00">📋 待處理採購訂單</span>
      <span id="gj-queue-badge" style="background:#e67e22;color:#fff;border-radius:12px;padding:2px 9px;font-size:13px;font-weight:700">0</span>
      <span style="font-size:12px;color:#888;margin-left:4px">（保留 72 小時）</span>
    </div>
    <table style="width:100%;border-collapse:collapse;font-size:13px">
      <thead>
        <tr style="background:#fef3cd;color:#555">
          <th style="padding:5px 10px;text-align:left">客戶</th>
          <th style="padding:5px 10px;text-align:left">GJ PO / 客戶PO</th>
          <th style="padding:5px 10px;text-align:left">訂單日期</th>
          <th style="padding:5px 10px;text-align:left">匯出時間</th>
          <th style="padding:5px 10px;text-align:left">操作</th>
        </tr>
      </thead>
      <tbody id="gj-queue-tbody"></tbody>
    </table>
  </div>

  <div id="drop-zone"
       onclick="document.getElementById('fin').click()"
       ondragover="event.preventDefault();this.classList.add('over')"
       ondragleave="this.classList.remove('over')"
       ondrop="doDrop(event)">
    📂 點擊或拖放訂單 JSON 至此處（業務報價系統匯出的訂單）
    <input type="file" id="fin" accept=".json" style="display:none" onchange="loadFile(this)">
  </div>

  <!-- ── 自行下單 Manual Order ── -->
  <div id="manual-panel" style="border:2px solid #4a90d9;border-radius:10px;margin-bottom:12px;background:#fff">
    <div onclick="mToggle()" style="cursor:pointer;padding:11px 16px;background:#eaf3fb;border-radius:8px 8px 0 0;font-weight:700;color:#1a3a5c;display:flex;justify-content:space-between;align-items:center">
      <span>✍️ 自行下單（手動建立採購單 — 不在系統內的客戶訂單）</span>
      <span id="m-arrow">▼</span>
    </div>
    <div id="manual-body" style="display:none;padding:14px 16px">
      <div class="row" style="margin-bottom:10px">
        <label>客戶:
          <select id="m-cust" onchange="mCustChange()" style="margin-left:3px">
            <option value="">— 選擇 —</option>
            <option>美廉社</option><option>東森</option><option>生活良好</option>
            <option>悠旅生活</option><option>好市多</option><option>高玉</option>
            <option value="__other">其他（手動輸入）</option>
          </select>
        </label>
        <input type="text" id="m-custOther" placeholder="輸入客戶名稱" style="display:none">
        <label>客戶PO: <input type="text" id="m-custPO" style="width:120px"></label>
        <label>GJ PO: <input type="text" id="m-gjPO" style="width:120px" placeholder="如 25BK0009"></label>
        <label>訂單日期: <input type="date" id="m-date"></label>
      </div>
      <div class="row" style="margin-bottom:6px">
        <label style="flex:1">🔍 搜尋產品（中/英文/EAN/供應商）:
          <input type="text" id="m-search" oninput="mSearch()" placeholder="輸入關鍵字…" style="width:320px">
        </label>
      </div>
      <div id="m-results" style="max-height:200px;overflow:auto;border:1px solid #eee;border-radius:6px;margin-bottom:10px;display:none"></div>
      <div id="m-cart-wrap" style="display:none">
        <div style="font-weight:700;color:#555;margin-bottom:4px">已加入採購項目：</div>
        <table style="width:100%;border-collapse:collapse;font-size:12px;margin-bottom:10px">
          <thead><tr style="background:#f5f7fa;color:#555">
            <th style="padding:4px 8px;text-align:left">供應商</th>
            <th style="padding:4px 8px;text-align:left">產品</th>
            <th style="padding:4px 8px">規格</th>
            <th style="padding:4px 8px">箱數</th>
            <th style="padding:4px 8px">移除</th>
          </tr></thead>
          <tbody id="m-cart"></tbody>
        </table>
        <button class="btn btn-go" onclick="mGenerate()">⚡ 產生採購 PO</button>
        <button class="btn" style="background:#999;color:#fff" onclick="mClear()">清空</button>
      </div>
    </div>
  </div>

  <div id="order-info"></div>

  <div class="row" id="config-row">
    <label>ETD: <input type="date" id="inp-etd"></label>
    <label>ETA: <input type="date" id="inp-eta"></label>
    <label style="flex:1">折扣/特別備注:
      <input type="text" id="inp-note" style="width:280px" placeholder="e.g. 3% discount is applied as agreed">
    </label>
    <button class="btn btn-go" onclick="buildAllPO()">⚡ 生成 PO 草稿</button>
    <button class="btn btn-print" onclick="window.print()">🖨 列印 / 存 PDF</button>
  </div>
</div>

<!-- ── PO Output ── -->
<div id="po-wrapper"></div>

</div><!-- #app -->

let currentOrder = null;

// ── File loading ─────────────────────────────
function doDrop(ev){
  ev.preventDefault();
  document.getElementById('drop-zone').classList.remove('over');
  const f=ev.dataTransfer.files[0];
  if(f) parseFile(f);
}
function loadFile(inp){ if(inp.files[0]) parseFile(inp.files[0]); }
function parseFile(f){
  const r=new FileReader();
  r.onload=e=>{
    try{
      currentOrder=JSON.parse(e.target.result);
      showOrderMeta(currentOrder, f.name);
    }catch(err){alert('JSON 格式錯誤：'+err.message);}
  };
  r.readAsText(f,'UTF-8');
}

function showOrderMeta(o, fname){
  const items=(o.items||[]).filter(it=>isBuy(it));
  const byS={};
  items.forEach(it=>{const k=it.supCode||it.supplier;(byS[k]=byS[k]||[]).push(it);});
  const nS=Object.keys(byS).length;
  const el=document.getElementById('order-info');
  el.style.display='block';
  el.innerHTML=`
    <b>✅ ${fname||'訂單'}</b> &nbsp;|&nbsp;
    客戶：<b>${o.customer||'—'}</b> &nbsp;|&nbsp;
    日期：${o.orderDate||'—'} &nbsp;|&nbsp;
    GJ PO：<b>${o.gjPO||o.orderId||'—'}</b> &nbsp;|&nbsp;
    客戶PO：${o.custPO||'—'} &nbsp;|&nbsp;
    採購項目：<b>${items.length}</b> 項
    ${nS>1?`<br><span style="color:#e67e22">⚠ 涉及 <b>${nS}</b> 家供應商，將產生 ${nS} 份 PO</span>`:''}
    ${items.length===0?'<br><span style="color:#c0392b">⚠ 此訂單無買進/買進轉手項目，無需對外採購</span>':''}
  `;
  document.getElementById('config-row').style.display='flex';
  const dz=document.getElementById('drop-zone');
  dz.classList.add('loaded');
  dz.innerHTML=`✅ ${fname} — 點擊重新載入<input type="file" id="fin" accept=".json" style="display:none" onchange="loadFile(this)">`;
}

function isBuy(it){
  return ['買進','買進轉手'].includes(it.cooperMode||'');
}

// ── PO Queue (72h retention, multi-order) ────────────
const PO_QUEUE_KEY = 'gj_po_queue';
const PO_QUEUE_TTL = 72 * 60 * 60 * 1000; // 72 hours in ms

function queueReadAll(){
  try{ return JSON.parse(localStorage.getItem(PO_QUEUE_KEY)||'[]'); }catch(e){ return []; }
}
function queueSave(list){ localStorage.setItem(PO_QUEUE_KEY, JSON.stringify(list)); }
function queuePurgeOld(list){ return list.filter(e=> Date.now()-new Date(e.queuedAt).getTime() < PO_QUEUE_TTL); }
function queueRemove(id){
  const list = queuePurgeOld(queueReadAll()).filter(e=>e.id!==id);
  queueSave(list);
}

function timeAgo(isoStr){
  const s = Math.floor((Date.now()-new Date(isoStr).getTime())/1000);
  if(s<60) return `${s}秒前`;
  const m=Math.floor(s/60); if(m<60) return `${m}分鐘前`;
  const h=Math.floor(m/60); if(h<24) return `${h}小時前`;
  return `${Math.floor(h/24)}天前`;
}

function loadFromData(order, label){
  currentOrder = order;
  showOrderMeta(order, label || `訂單_${order.customer||''}_${order.orderDate||''}`);
  const items=(order.items||[]).filter(isBuy);
  if(items.length) buildAllPO();
}

function showToast(msg, color){
  let t=document.getElementById('gj-toast');
  if(!t){
    t=document.createElement('div');
    t.id='gj-toast';
    t.style.cssText='position:fixed;top:18px;left:50%;transform:translateX(-50%);color:#fff;padding:10px 22px;border-radius:8px;font-size:14px;font-weight:700;z-index:9999;box-shadow:0 2px 8px rgba(0,0,0,.3);transition:opacity .4s';
    document.body.appendChild(t);
  }
  t.style.background = color||'#1e8449';
  t.textContent=msg;
  t.style.opacity='1';
  setTimeout(()=>{ t.style.opacity='0'; }, 3500);
}

function renderQueuePanel(){
  const list = queuePurgeOld(queueReadAll());
  queueSave(list);
  const panel = document.getElementById('gj-queue-panel');
  const dz = document.getElementById('drop-zone');
  if(!panel) return;
  if(!list.length){
    panel.style.display='none';
    if(dz) dz.style.display='block';
    return;
  }
  panel.style.display='block';
  if(dz) dz.style.display='none';
  const badge = document.getElementById('gj-queue-badge');
  if(badge) badge.textContent = list.length;
  const tbody = document.getElementById('gj-queue-tbody');
  if(!tbody) return;
  tbody.innerHTML = list.map(e=>{
    const o=e.order;
    const hasBuy=(o.items||[]).some(isBuy);
    return `<tr>
      <td style="padding:6px 10px;font-weight:700">${o.customer||'—'}</td>
      <td style="padding:6px 10px">${o.gjPO||o.custPO||'—'}</td>
      <td style="padding:6px 10px">${o.orderDate||'—'}</td>
      <td style="padding:6px 10px;color:#888;font-size:12px">${timeAgo(e.queuedAt)}</td>
      <td style="padding:6px 10px">${hasBuy
        ? `<button onclick="queueLoad('${e.id}')" style="background:#1a6b3c;color:#fff;border:none;border-radius:5px;padding:4px 12px;cursor:pointer;font-size:13px">載入</button>`
        : `<span style="color:#999;font-size:12px">無採購項目</span>`}
        &nbsp;<button onclick="queueDismiss('${e.id}')" style="background:#e74c3c;color:#fff;border:none;border-radius:5px;padding:4px 8px;cursor:pointer;font-size:12px">✕</button>
      </td>
    </tr>`;
  }).join('');
}

function queueLoad(id){
  const list = queueReadAll();
  const entry = list.find(e=>e.id===id);
  if(!entry){ showToast('找不到該筆訂單','#c0392b'); return; }
  queueRemove(id);
  loadFromData(entry.order);
  showToast('✅ 已載入：'+(entry.order.gjPO||entry.order.customer||'訂單'));
  renderQueuePanel();
}

function queueDismiss(id){
  queueRemove(id);
  showToast('已從待辦清單移除','#7f8c8d');
  renderQueuePanel();
}

document.addEventListener('DOMContentLoaded', ()=>{
  // 遷移舊版單筆資料 → queue
  const legacy = localStorage.getItem('gj_po_pending');
  if(legacy){
    try{
      const o = JSON.parse(legacy);
      const list = queueReadAll();
      list.unshift({id: Date.now().toString(), queuedAt: o._exported||new Date().toISOString(), order: o});
      queueSave(list);
    }catch(e){}
    localStorage.removeItem('gj_po_pending');
  }
  renderQueuePanel();
  // 只有一筆且有買進項目 → 自動載入，無需任何手動操作
  const pending = queuePurgeOld(queueReadAll());
  if(pending.length === 1 && (pending[0].order.items||[]).some(isBuy)){
    queueLoad(pending[0].id);
  }
});

// ── Product matching ─────────────────────────
function matchProd(item){
  const ean=String(item.ean||'');
  if(ean){const p=PRODS.find(p=>p.ean===ean);if(p)return p;}
  const en=(item.englishName||'').toLowerCase().trim();
  if(en){const p=PRODS.find(p=>(p.en||'').toLowerCase().trim()===en);if(p)return p;}
  const zh=(item.name||'').trim();
  if(zh){const p=PRODS.find(p=>(p.zh||'').includes(zh)||zh.includes((p.zh||'').replace(/^#\d+\s*/,'')));if(p)return p;}
  return null;
}

// ── PO Generation ────────────────────────────
function buildAllPO(){
  if(!currentOrder){alert('請先載入訂單 JSON');return;}
  const items=(currentOrder.items||[]).filter(isBuy);
  if(!items.length){alert('此訂單沒有買進/買進轉手項目');return;}

  // Group by supplier
  const byS={};
  items.forEach(it=>{
    const k=it.supCode||it.supplier||'UNKNOWN';
    if(!byS[k])byS[k]={supCode:it.supCode,supplier:it.supplier,cur:it.currency||'USD',inc:it.supIncoterm||'CIF',pay:it.supPayment||'',items:[]};
    byS[k].items.push(it);
  });

  const etd=document.getElementById('inp-etd').value;
  const eta=document.getElementById('inp-eta').value;
  const note=document.getElementById('inp-note').value.trim();
  const groups=Object.values(byS);

  let html='';
  groups.forEach((g,i)=>{ html+=buildOnePO(currentOrder,g,etd,eta,note,i,groups.length); });

  const w=document.getElementById('po-wrapper');
  w.innerHTML=html;
  w.style.display='block';
  w.scrollIntoView({behavior:'smooth'});
}

function fmtDate(iso){
  if(!iso)return'';
  const d=new Date(iso);
  const M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return`${String(d.getDate()).padStart(2,'0')}-${M[d.getMonth()]}-${d.getFullYear()}`;
}
function today(){
  const d=new Date();
  return`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}
function n2(n){return typeof n==='number'?n.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2}):'';}

function buildOnePO(order,grp,etd,eta,note,idx,total){

    <td class="tr"><b>${totAmtFmt}</b></td>

</tfoot>

<div class="remarks">

  <p>2. Based on local regulation, for shipments import to Taiwan, all wooden packing materials MUST be fumigated as follow ISPM-No. 15 method and marked with "IPPC" logo clearly on the packing materials surface.</p>
  <p>3. Organic products must have the certificate symbol on the pack or bottle. Supplier MUST provide "ECOCERT CERTIFICATE OF PRODUCTS FROM ORGANIC PRODUCTION" for import Customs clearance. Without ECOCERT CERTIFICATE, please DO NOT ship organic products.</p>
  <p class="etd-line">SHIPMENT &nbsp;&nbsp; ETD <span contenteditable="true">${fmtDate(etd)||'[ETD]'}</span> &nbsp;&nbsp;&nbsp; ETA <span contenteditable="true">${fmtDate(eta)||'[ETA]'}</span></p>
