  .header p { font-size: 11px; opacity: .8; }
  .controls { background: #fff; padding: 12px 16px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
  .controls input, .controls select { padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 12px; }
  .controls input { width: 200px; }
  .controls label { font-size: 11px; color: var(--gray); margin-right: 2px; }
  .stats { margin-left: auto; font-size: 11px; color: var(--gray); }
  .stats span { font-weight: bold; color: var(--blue-mid); }
  .table-wrap { overflow-x: auto; background: #fff; border: 1px solid var(--border); border-radius: 0 0 8px 8px; }
  table { width: 100%; border-collapse: collapse; min-width: 1200px; }
  thead tr th {
    background: var(--blue-mid); color: #fff; padding: 8px 10px;
    text-align: left; font-size: 11px; white-space: nowrap;
    border-right: 1px solid rgba(255,255,255,0.2);
    position: sticky; top: 0; z-index: 10;
  }
  thead tr th:first-child { border-left: none; }
  tbody tr { border-bottom: 1px solid #e8ecf0; }
  tbody tr:hover { background: #d4e8f7 !important; }
  tbody tr.imported { background: var(--green-light); }
  tbody tr.discussing { background: var(--yellow-light); }
  tbody tr:not(.imported):not(.discussing):nth-child(even) { background: var(--blue-light); }
  td { padding: 6px 10px; vertical-align: middle; font-size: 11px; white-space: nowrap; border-right: 1px solid #e8ecf0; }
  td.num { text-align: right; }
  td.name { max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
  td.en { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #555; }
  .badge { display: inline-block; padding: 1px 7px; border-radius: 10px; font-size: 10px; font-weight: 600; }
  .badge-frozen { background: #DDEEFF; color: #1a5fa8; }
  .badge-normal { background: #F0F0F0; color: #555; }
  .badge-buy { background: #E2EFDA; color: #375623; }
  .badge-commission { background: #EDE7F6; color: #4527A0; }
  .badge-consign { background: #FFF3E0; color: #E65100; }
  .badge-src-imp { background: #E2EFDA; color: #375623; }
  .badge-src-dis { background: #FFF2CC; color: #7d6608; }
  .legend { display: flex; gap: 14px; padding: 10px 0 4px; font-size: 11px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-box { width: 14px; height: 14px; border-radius: 3px; border: 1px solid #ccc; }

  .lb-dis { background: var(--yellow-light); }
  .lb-even { background: var(--blue-light); }

  .hidden { display: none; }

let sortDir = {};

function sortTable(col) {
  const tbody = document.getElementById('tbody');
  const rows = Array.from(tbody.querySelectorAll('tr:not(.hidden)'));
  sortDir[col] = !sortDir[col];
  rows.sort((a,b) => {
    const av = a.cells[col].textContent.trim();
    const bv = b.cells[col].textContent.trim();
    const an = parseFloat(av), bn = parseFloat(bv);
    if (!isNaN(an) && !isNaN(bn)) return sortDir[col] ? an-bn : bn-an;
    return sortDir[col] ? av.localeCompare(bv,'zh') : bv.localeCompare(av,'zh');
  });
  rows.forEach(r => tbody.appendChild(r));
}

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase();
  const fType = document.getElementById('fType').value;
  const fSup = document.getElementById('fSup').value;
  const fOrig = document.getElementById('fOrig').value;
  const fBiz = document.getElementById('fBiz').value;
  const fSrc = document.getElementById('fSrc').value;
  let cnt = 0;
  document.querySelectorAll('#tbody tr').forEach(tr => {
    const txt = tr.textContent.toLowerCase();
    const show = (!q || txt.includes(q))
      && (!fType || tr.dataset.type === fType)
      && (!fSup || tr.dataset.sup === fSup)
      && (!fOrig || tr.dataset.orig === fOrig)
      && (!fBiz || tr.dataset.biz === fBiz)
      && (!fSrc || tr.dataset.src === fSrc);
    tr.classList.toggle('hidden', !show);
    if(show) cnt++;
  });
  document.getElementById('cnt').textContent = cnt;
}

['search','fType','fSup','fOrig','fBiz','fSrc'].forEach(id => {
  document.getElementById(id).addEventListener('input', applyFilters);
  document.getElementById(id).addEventListener('change', applyFilters);
});
