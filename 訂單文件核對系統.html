    const pill=(r.err?'<span class="pill err">⚠️ 文件不符</span>':(r.pass?'<span class="pill pass">✅ 歸檔完成</span>':'<span class="pill wip">核對中 '+r.nrecv+'/5</span>'))+arch;
    const docs=SEQ.map(t=>{const d=r.docs[t]||{};const st=d['狀態']||'待提供';const ln=d['連結']||'';
      const inner=`<div class="t">${t}${ln?' <span class="lk">📎</span>':''}</div><div class="s s${st}">${st}</div><div class="dt">${d['日期']?'提供 '+d['日期']:'—'}</div>`;
      return ln?`<a class="doc lkdoc" href="${esc(ln)}" target="_blank" rel="noopener" title="點開文件">${inner}</a>`:`<div class="doc">${inner}</div>`}).join('');
    const chk=FIELDS.map(f=>{const v=r.chk[f]||'待';const c=v==='✓'?'cf-ok':(v==='⚠️'?'cf-err':'cf-w');return `<span class="cf ${c}">${f} ${v}</span>`}).join('');
    const div=document.createElement('div');div.className='po '+cls;
    div.innerHTML=`<div class="po-h"><b>${esc(r.po)}</b><span class="meta">${esc(r.cust)}｜${esc(r.sup)}｜${esc(r.prod)}</span>${pill}</div>
      <div class="docs">${docs}</div>
      <div class="chk"><span class="lbl">文件互比:</span>${chk}</div>
      ${r.note?`<div class="note ${r.err?'err':''}">📝 ${esc(r.note)}</div>`:''}`;
    L.appendChild(div);
  });
  if(!n)L.innerHTML='<div style="text-align:center;color:#99a;padding:30px">無符合的訂單</div>';
}
document.getElementById('q').oninput=render;document.getElementById('fs').onchange=render;render();
</script></body></html>
