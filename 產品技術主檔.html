<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>產品技術主檔 — 高玉企業</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--green:#013121;--gold:#C9A84C;--bg:#F4F6FA;--border:#e2e8f0;--text:#1a1a2e;--muted:#6b7280;--red:#dc2626;--orange:#ea580c;--yellow:#d97706;--teal:#0891b2}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--text);font-size:13px;height:100vh;overflow:hidden;display:flex;flex-direction:column}
/* Top bar */
.topbar{background:var(--green);color:#fff;padding:0 14px;height:44px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.topbar strong{font-size:14px}
.maintabs{display:flex;gap:4px;margin-left:10px}
.mtab{padding:5px 14px;border-radius:5px;border:1px solid rgba(255,255,255,.3);background:transparent;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.mtab.active{background:var(--gold);border-color:var(--gold);color:var(--green)}
.spacer{flex:1}
.export-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.4);color:#fff;padding:5px 12px;border-radius:5px;font-size:12px;cursor:pointer;font-family:inherit}
.export-btn:hover{background:rgba(255,255,255,.25)}
/* Layout */
.content{flex:1;overflow:hidden;display:none}
.content.active{display:flex}
/* Toolbar */
.toolbar{background:#fff;border-bottom:1px solid var(--border);padding:8px 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-wrap input{width:100%;height:32px;border:1.5px solid var(--border);border-radius:6px;padding:0 10px 0 30px;font-size:12px}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px}
select.fil{height:32px;border:1.5px solid var(--border);border-radius:6px;padding:0 8px;font-size:12px;min-width:110px;background:#fff}
.count-badge{font-size:11px;color:var(--muted);white-space:nowrap}
/* Split layout for product tab */
.split{flex:1;overflow:hidden;display:flex}
.list-panel{width:55%;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.detail-panel{flex:1;overflow-y:auto;background:#fff}
/* Product table */
.tbl-wrap{flex:1;overflow-y:auto}
table{width:100%;border-collapse:collapse}
th{background:#f8fafc;border-bottom:2px solid var(--border);padding:7px 8px;text-align:left;font-size:11px;font-weight:700;color:var(--muted);white-space:nowrap;position:sticky;top:0;z-index:1}
td{padding:7px 8px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
tr.selected td{background:#eff6ff}
tr:hover td{background:#f8fafc;cursor:pointer}
tr.selected:hover td{background:#dbeafe}
.pname{font-weight:600;font-size:12px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pname-en{font-size:11px;color:var(--muted);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sup-chip{display:inline-block;background:#f1f5f9;border-radius:4px;padding:1px 5px;font-size:10px;color:#374151}
/* Completeness bar */
.comp-wrap{display:flex;align-items:center;gap:5px;min-width:70px}
.comp-bar{flex:1;height:6px;background:#e5e7eb;border-radius:3px;overflow:hidden}
.comp-fill{height:100%;border-radius:3px}
.c0{background:#ef4444}.c25{background:#f97316}.c50{background:#eab308}.c75{background:#22c55e}.c100{background:#16a34a}
.comp-pct{font-size:10px;color:var(--muted);width:28px;text-align:right}
/* Channel chips */
.ch-chips{display:flex;flex-wrap:wrap;gap:2px}
.ch-chip{font-size:10px;padding:1px 5px;border-radius:3px;background:#dbeafe;color:#1d4ed8}
/* Detail panel */
.dp-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;color:var(--muted);gap:8px}
.dp-empty svg{opacity:.3}
.dp-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start}
.dp-title{font-size:14px;font-weight:700;line-height:1.3}
.dp-sub{font-size:11px;color:var(--muted);margin-top:2px}
.edit-btn{background:var(--green);color:#fff;border:0;border-radius:5px;padding:5px 12px;font-size:12px;cursor:pointer;font-family:inherit;flex-shrink:0}
.edit-btn:hover{background:#2A5240}
.dp-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 16px;gap:0}
.dp-tab{padding:8px 14px;border-bottom:2px solid transparent;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer}
.dp-tab.active{color:var(--green);border-bottom-color:var(--green)}
.dp-body{padding:14px 16px}
.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px}
.field-item{display:flex;flex-direction:column;gap:2px}
.field-item.full{grid-column:1/-1}
.fl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.fv{font-size:12px;color:var(--text);min-height:18px;padding:3px 0}
.fv.empty{color:#d1d5db;font-style:italic}
.fv textarea{width:100%;border:1px solid var(--border);border-radius:4px;padding:6px;font-size:12px;resize:vertical;min-height:60px;font-family:inherit}
.fv input[type=text],.fv input[type=number]{width:100%;border:1px solid var(--border);border-radius:4px;padding:5px 7px;font-size:12px;font-family:inherit}
.cert-list{display:flex;flex-wrap:wrap;gap:4px;margin-top:3px}
.cert-chip{background:#dcfce7;color:#166534;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:600}
.channel-tbl{width:100%;border-collapse:collapse;margin-top:6px}
.channel-tbl th,.channel-tbl td{padding:5px 8px;border:1px solid var(--border);font-size:11px;text-align:left}
.channel-tbl th{background:#f8fafc;font-weight:700;color:var(--muted)}
.status-ok{color:#16a34a;font-weight:700}
.status-pending{color:#d97706}
.status-no{color:#9ca3af}
/* Supplier tab */
.sup-layout{flex:1;overflow:hidden;display:flex}
.sup-list{width:320px;border-right:1px solid var(--border);overflow-y:auto;background:#fff}
.sup-item{padding:10px 14px;border-bottom:1px solid #f1f5f9;cursor:pointer}
.sup-item:hover{background:#f8fafc}
.sup-item.selected{background:#eff6ff}
.sup-name{font-weight:700;font-size:13px}
.sup-meta{font-size:11px;color:var(--muted);margin-top:2px}
.sup-detail{flex:1;overflow-y:auto;padding:18px 20px;background:#fff}
.section-title{font-size:12px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.5px;margin:16px 0 8px;padding-bottom:4px;border-bottom:2px solid var(--gold)}
.info-grid{display:grid;grid-template-columns:140px 1fr;gap:6px 12px;margin-bottom:4px}
.info-label{font-size:11px;font-weight:700;color:var(--muted)}
.info-value{font-size:12px;color:var(--text)}
.bank-hidden{filter:blur(4px);cursor:pointer;user-select:none}
.bank-reveal-btn{font-size:11px;background:none;border:1px solid var(--border);border-radius:4px;padding:2px 8px;cursor:pointer;color:var(--muted);margin-left:8px}
/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:10px;width:min(680px,95vw);max-height:85vh;overflow-y:auto;padding:24px}
.modal-title{font-size:16px;font-weight:800;color:var(--green);margin-bottom:16px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-item{display:flex;flex-direction:column;gap:4px}
.form-item.full{grid-column:1/-1}
.form-label{font-size:11px;font-weight:700;color:var(--muted)}
.form-item input,.form-item textarea,.form-item select{border:1.5px solid var(--border);border-radius:6px;padding:7px 9px;font-size:12px;font-family:inherit;width:100%}
.form-item textarea{min-height:70px;resize:vertical}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;padding-top:14px;border-top:1px solid var(--border)}
.btn-cancel{border:1.5px solid var(--border);background:#fff;padding:7px 16px;border-radius:6px;font-size:13px;cursor:pointer;font-family:inherit}
.btn-save{background:var(--green);color:#fff;border:0;padding:7px 20px;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.saved-toast{position:fixed;bottom:18px;right:18px;background:#013121;color:#fff;padding:8px 16px;border-radius:7px;font-size:12px;font-weight:700;opacity:0;transition:opacity .3s;z-index:2000}
.saved-toast.show{opacity:1}
/* Responsive */
@media(max-width:900px){.split,.sup-layout{flex-direction:column}.list-panel{width:100%;max-height:40vh}.sup-list{width:100%;max-height:220px}}

/* ===== PDF Export Modal ===== */
.pdf-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;align-items:center;justify-content:center}
.pdf-modal-overlay.open{display:flex}
.pdf-modal{background:#fff;border-radius:10px;width:min(760px,96vw);max-height:90vh;display:flex;flex-direction:column;overflow:hidden}
.pdf-modal-head{background:var(--green);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.pdf-modal-head h2{font-size:15px;font-weight:700;margin:0}
.pdf-close{background:none;border:none;color:#fff;font-size:18px;cursor:pointer;padding:0 4px;line-height:1}
.pdf-modal-body{padding:18px 20px;overflow-y:auto;flex:1}
.pdf-section{margin-bottom:18px}
.pdf-section-title{font-size:11px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.pdf-sup-select{width:100%;height:36px;border:1.5px solid var(--border);border-radius:6px;padding:0 10px;font-size:13px}
.pdf-prod-list{max-height:220px;overflow-y:auto;border:1.5px solid var(--border);border-radius:6px}
.pdf-prod-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-bottom:1px solid #f1f5f9;font-size:12px;cursor:pointer}
.pdf-prod-item:last-child{border-bottom:none}
.pdf-prod-item:hover{background:#f8fafc}
.pdf-prod-item input[type=checkbox]{accent-color:var(--green);width:14px;height:14px;flex-shrink:0;cursor:pointer}
.pdf-prod-name{font-weight:600;color:var(--text)}
.pdf-prod-spec{color:var(--muted);font-size:11px}
.pdf-prod-ean{color:var(--muted);font-size:10px;font-family:monospace}
.pdf-sel-all{font-size:11px;color:var(--green);cursor:pointer;text-decoration:underline;margin-bottom:6px;display:inline-block}
.pdf-fields-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.pdf-field-chk{display:flex;align-items:center;gap:6px;font-size:12px;padding:5px 8px;border-radius:5px;background:#f8fafc;cursor:pointer}
.pdf-field-chk input[type=checkbox]{accent-color:var(--green);cursor:pointer}
.pdf-field-chk span{color:var(--muted);font-size:10px}
.pdf-modal-foot{border-top:1px solid var(--border);padding:12px 20px;display:flex;justify-content:flex-end;gap:10px;flex-shrink:0;background:#fff}
.pdf-gen-btn{background:var(--green);color:#fff;border:none;padding:8px 22px;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer}
.pdf-gen-btn:hover{background:#2A5240}
.pdf-gen-btn:disabled{opacity:.45;cursor:not-allowed}
.pdf-cancel-btn{background:#fff;border:1.5px solid var(--border);padding:8px 16px;border-radius:6px;font-size:13px;cursor:pointer}
.pdf-no-prod{color:var(--muted);font-size:12px;padding:16px;text-align:center}
</style>
</head>
<body>

<div class="topbar">
  <strong>📦 產品技術主檔</strong>
  <div class="maintabs">
    <button class="mtab active" onclick="switchTab('prod')">📋 產品主檔</button>
    <button class="mtab" onclick="switchTab('sup')">🏭 供應商主檔</button>
  </div>
  <div class="spacer"></div>
  <span id="roleTag" style="font-size:11px;opacity:.7"></span>
  <button class="export-btn" onclick="openPdfModal()" style="margin-right:4px">📄 匯出技術資料</button>
  <button class="export-btn" onclick="exportJSON()">⬇ 匯出更新 JSON</button>
</div>

<!-- ===== PDF Export Modal ===== -->
<div class="pdf-modal-overlay" id="pdf-modal">
  <div class="pdf-modal">
    <div class="pdf-modal-head">
      <h2>📄 匯出產品技術資料 PDF</h2>
      <button class="pdf-close" onclick="closePdfModal()">✕</button>
    </div>
    <div class="pdf-modal-body">
      <div class="pdf-section">
        <div class="pdf-section-title">① 選擇供應商</div>
        <select class="pdf-sup-select" id="pdf-sup-sel" onchange="loadPdfProds()">
          <option value="">— 請選擇供應商 —</option>
        </select>
      </div>
      <div class="pdf-section">
        <div class="pdf-section-title">② 勾選產品</div>
        <span class="pdf-sel-all" onclick="pdfToggleAll()">全選 / 全不選</span>
        <div class="pdf-prod-list" id="pdf-prod-list">
          <div class="pdf-no-prod">請先選擇供應商</div>
        </div>
      </div>
      <div class="pdf-section">
        <div class="pdf-section-title">③ 選擇要匯出的欄位</div>
        <div class="pdf-fields-grid" id="pdf-fields-grid"></div>
      </div>
    </div>
    <div class="pdf-modal-foot">
      <button class="pdf-cancel-btn" onclick="closePdfModal()">取消</button>
      <button class="pdf-gen-btn" id="pdf-gen-btn" onclick="generatePdf()" disabled>產生 PDF</button>
    </div>
  </div>
</div>

<!-- ===== 產品主檔 TAB ===== -->
<div class="content active" id="tab-prod" style="flex-direction:column">
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search" placeholder="搜尋品名、EAN、品牌…" oninput="applyFilters()">
    </div>
    <select class="fil" id="fil-type" onchange="applyFilters()">
      <option value="">所有型態</option>
      <option>常溫</option><option>冷凍</option>
    </select>
    <select class="fil" id="fil-sup" onchange="applyFilters()">
      <option value="">所有供應商</option>
    </select>
    <select class="fil" id="fil-comp" onchange="applyFilters()">
      <option value="">所有完整度</option>
      <option value="0">0%（空白）</option>
      <option value="25">&lt;25%</option>
      <option value="50">&lt;50%</option>
      <option value="75">≥75%（完整）</option>
    </select>
    <select class="fil" id="fil-ch" onchange="applyFilters()">
      <option value="">所有通路</option>
      <option>美廉社</option><option>PX Mart</option><option>大全聯</option>
      <option>東森</option><option>好市多</option><option>家樂福</option><option>星巴克</option>
    </select>
    <span class="count-badge" id="count-badge">載入中…</span>
  </div>
  <div class="split">
    <div class="list-panel">
      <div class="tbl-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:30px">#</th>
              <th>品名</th>
              <th>品牌/供應商</th>
              <th>規格</th>
              <th>通路</th>
              <th style="width:85px">完整度</th>
            </tr>
          </thead>
          <tbody id="prod-tbody"></tbody>
        </table>
      </div>
    </div>
    <div class="detail-panel" id="detail-panel">
      <div class="dp-empty">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
        <span>點擊左側產品列查看詳情</span>
      </div>
    </div>
  </div>
</div>

<!-- ===== 供應商主檔 TAB ===== -->
<div class="content" id="tab-sup" style="flex-direction:column">
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="sup-search" placeholder="搜尋供應商名稱、國家…" oninput="applySupFilter()">
    </div>
    <select class="fil" id="sup-fil-type" onchange="applySupFilter()">
      <option value="">所有型態</option>
      <option>常溫</option><option>冷凍</option>
    </select>
    <span class="count-badge" id="sup-count-badge"></span>
  </div>
  <div class="sup-layout">
    <div class="sup-list" id="sup-list"></div>
    <div class="sup-detail" id="sup-detail">
      <div class="dp-empty" style="margin-top:60px">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0H5m14 0h2M5 21H3"/></svg>
        <span>點擊左側供應商查看詳情</span>
      </div>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-title">✏️ 編輯技術資料</div>
    <div id="modal-product-name" style="font-size:12px;color:#6b7280;margin-bottom:14px"></div>
    <div class="form-grid" id="edit-form-grid"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" onclick="saveModal()">儲存</button>
    </div>
  </div>
</div>
<div class="saved-toast" id="toast">✓ 已儲存</div>

<script>
// ============================================================

// ============================================================
// STATE
// ============================================================
const params = new URLSearchParams(location.search);
const role = params.get('role') || 'admin';
const canEdit = role !== 'noah';
const isAdmin = role === 'admin';
const isNoah = role === 'noah';

document.getElementById('roleTag').textContent = 
  role === 'admin' ? '管理者' : role === 'tina' ? 'Tina Kao' : 'Noah Tseng';

// Load local overrides from localStorage
let localTech = {};
try { localTech = JSON.parse(localStorage.getItem('gj_tech_overrides') || '{}'); } catch(e) {}

// Merge function: TECH_RAW + localTech
function getTech(key) {
  const base = TECH_RAW[key] || {};
  const over = localTech[key] || {};
  return Object.assign({}, base, over);
}

// Build merged product list
let allProds = PRODS.map((p, idx) => {
  const ean = String(p['EAN'] || '');
  const key = ean && ean !== 'None' ? ean : (p['供應商編號'] || '') + '__' + (p['中文品名'] || '');
  return { ...p, _idx: idx, _ean: ean, _key: key, _tech: getTech(key) };
});

// Noah filter: 冷凍+非食品 only
if (isNoah) {
  allProds = allProds.filter(p => p['型態'] === '冷凍' || p['產品類別'] === '非食品');
}

let filtered = [...allProds];
let selectedKey = null;
let editKey = null;

// ============================================================
// COMPLETENESS
// ============================================================
const COMP_FIELDS = ['brand','manufacturer_en','factory_addr_en','carton_dim','shelf_life_m','ingredients','allergens','hs_code'];

function calcComp(tech) {
  const filled = COMP_FIELDS.filter(f => {
    const v = tech[f];
    return v !== null && v !== undefined && v !== '';
  }).length;
  return Math.round(filled / COMP_FIELDS.length * 100);
}

function compColor(pct) {
  if (pct >= 75) return 'c75';
  if (pct >= 50) return 'c50';
  if (pct >= 25) return 'c25';
  return 'c0';
}

function compBar(pct) {
  const cls = compColor(pct);
  return `<div class="comp-wrap"><div class="comp-bar"><div class="comp-fill ${cls}" style="width:${pct}%"></div></div><span class="comp-pct">${pct}%</span></div>`;
}

// ============================================================
// FILTERS
// ============================================================
function initFilters() {
  const sups = [...new Set(PRODS.map(p => p['供應商']).filter(Boolean))].sort();
  const sel = document.getElementById('fil-sup');
  sups.forEach(s => { const o = document.createElement('option'); o.textContent = s; sel.appendChild(o); });
}

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase();
  const type = document.getElementById('fil-type').value;
  const sup = document.getElementById('fil-sup').value;
  const comp = document.getElementById('fil-comp').value;
  const ch = document.getElementById('fil-ch').value;

  filtered = allProds.filter(p => {
    if (type && p['型態'] !== type) return false;
    if (sup && p['供應商'] !== sup) return false;
    if (ch) {
      const chans = String(p['適用通路'] || '');
      if (!chans.includes(ch)) return false;
    }
    if (comp !== '') {
      const pct = calcComp(p._tech);
      if (comp === '0' && pct > 0) return false;
      if (comp === '25' && pct >= 25) return false;
      if (comp === '50' && pct >= 50) return false;
      if (comp === '75' && pct < 75) return false;
    }
    if (q) {
      const searchStr = [p['中文品名'],p['英文品名'],p['EAN'],p._tech.brand,p['供應商']].join(' ').toLowerCase();
      if (!searchStr.includes(q)) return false;
    }
    return true;
  });

  renderList();
  document.getElementById('count-badge').textContent = `共 ${filtered.length} / ${allProds.length} 筆`;
}

// ============================================================
// PRODUCT LIST RENDER
// ============================================================
function renderList() {
  const tbody = document.getElementById('prod-tbody');
  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:24px;color:#9ca3af">無符合條件的產品</td></tr>';
    return;
  }
  tbody.innerHTML = filtered.map((p, i) => {
    const tech = p._tech;
    const pct = calcComp(tech);
    const channels = String(p['適用通路'] || '');
    const chTags = channels.split('/').map(c => c.trim()).filter(Boolean)
      .map(c => `<span class="ch-chip">${c}</span>`).join('');
    const sel = p._key === selectedKey ? ' selected' : '';
    return `<tr${sel} onclick="selectProd('${esc(p._key)}')">
      <td style="color:#9ca3af;font-size:10px">${i+1}</td>
      <td>
        <div class="pname">${p['中文品名'] || '—'}</div>
        <div class="pname-en">${p['英文品名'] || ''}</div>
      </td>
      <td>
        <div style="font-size:12px;font-weight:600">${tech.brand || '—'}</div>
        <span class="sup-chip">${p['供應商'] || ''}</span>
      </td>
      <td style="font-size:11px;white-space:nowrap">${p['規格'] || '—'}</td>
      <td><div class="ch-chips">${chTags}</div></td>
      <td>${compBar(pct)}</td>
    </tr>`;
  }).join('');
}

function esc(s) { return String(s).replace(/'/g,"\\x27").replace(/"/g,"\\x22"); }

// ============================================================
// PRODUCT DETAIL
// ============================================================
let detailTab = 'basic';

function selectProd(key) {
  selectedKey = key;
  const p = allProds.find(x => x._key === key);
  if (!p) return;
  // Update selected row highlight
  document.querySelectorAll('#prod-tbody tr').forEach(tr => tr.classList.remove('selected'));
  const rows = document.querySelectorAll('#prod-tbody tr');
  const idx = filtered.findIndex(x => x._key === key);
  if (rows[idx]) rows[idx].classList.add('selected');
  renderDetail(p);
}

function renderDetail(p) {
  const tech = p._tech;
  const dp = document.getElementById('detail-panel');
  const editBtn = canEdit ? `<button class="edit-btn" onclick="openEditModal('${esc(p._key)}')">✏️ 編輯</button>` : '';
  
  const tabs = ['basic','spec','pack','channel'].map(t => {
    const labels = {basic:'基本資訊',spec:'成分規格',pack:'包裝',channel:'通路認證'};
    return `<div class="dp-tab${t===detailTab?' active':''}" onclick="switchDetailTab('${t}','${esc(p._key)}')">${labels[t]}</div>`;
  }).join('');

  let body = '';
  if (detailTab === 'basic') {
    body = `<div class="field-grid">
      ${fld('品牌', tech.brand)}
      ${fld('製造商 (英文)', tech.manufacturer_en)}
      ${fld('工廠地址 (英文)', tech.factory_addr_en, true)}
      ${fld('生產國', p['生產國'])}
      ${fld('供應商', p['供應商'])}
      ${fld('儲存條件', tech.storage)}
    </div>`;
  } else if (detailTab === 'spec') {
    body = `<div class="field-grid">
      ${fld('保存期限 (月)', tech.shelf_life_m)}
      ${fld('效期格式', tech.bbd_fmt)}
      ${fld('酒精含量 %', tech.alcohol_pct)}
      ${fld('HS Code', tech.hs_code)}
      ${fld('成分', tech.ingredients, true)}
      ${fld('過敏原', tech.allergens, true)}
    </div>`;
  } else if (detailTab === 'pack') {
    body = `<div class="field-grid">
      ${fld('規格', p['規格'])}
      ${fld('箱入數', p['箱入數'])}
      ${fld('外箱尺寸 (cm)', tech.carton_dim)}
      ${fld('外箱淨重 (kg)', tech.net_wt_ctn)}
      ${fld('外箱毛重 (kg)', tech.gross_wt_ctn)}
      ${fld('EAN', p['EAN'])}
      ${fld('箱/板', p['箱/板'])}
      ${fld('BBD (天)', p['BBD(天)'])}
    </div>`;
  } else if (detailTab === 'channel') {
    const certs = (tech.certs || []);
    const certHtml = certs.length 
      ? `<div class="cert-list">${certs.map(c=>`<span class="cert-chip">${c}</span>`).join('')}</div>`
      : `<span class="fv empty">尚未填寫</span>`;
    const chans = String(p['適用通路'] || '').split('/').map(c=>c.trim()).filter(Boolean);
    const chanRows = chans.map(ch => {
      const status = (tech.channels || {})[ch];
      const statusHtml = status === '已建檔' ? `<span class="status-ok">✓ 已建檔</span>`
        : status === '建檔中' ? `<span class="status-pending">⏳ 建檔中</span>`
        : `<span class="status-no">—</span>`;
      const regNo = (tech.channels || {})[ch+'_reg'] || '';
      return `<tr><td>${ch}</td><td>${statusHtml}</td><td>${regNo}</td></tr>`;
    }).join('');
    body = `<div class="field-grid">
      ${fld('HS Code', tech.hs_code)}
      ${fld('進口報驗字號', tech.import_reg)}
      ${fld('備註', tech.notes, true)}
    </div>
    <div class="fl" style="margin-top:12px">品質認證</div>${certHtml}
    <div class="fl" style="margin-top:12px">通路建檔狀態</div>
    ${chanRows ? `<table class="channel-tbl"><thead><tr><th>通路</th><th>狀態</th><th>報驗字號/建檔號</th></tr></thead><tbody>${chanRows}</tbody></table>` : '<span class="fv empty">無通路資訊</span>'}`;
  }

  dp.innerHTML = `
    <div class="dp-header">
      <div>
        <div class="dp-title">${p['中文品名'] || '—'}</div>
        <div class="dp-sub">${p['英文品名'] || ''} ${p['EAN'] ? '｜ EAN: '+p['EAN'] : ''}</div>
      </div>
      ${editBtn}
    </div>
    <div class="dp-tabs">${tabs}</div>
    <div class="dp-body">${body}</div>`;
}

function fld(label, val, full=false) {
  const v = (val === null || val === undefined || val === '') ? '<span class="empty">未填寫</span>' : String(val);
  return `<div class="field-item${full?' full':''}"><span class="fl">${label}</span><div class="fv">${v}</div></div>`;
}

function switchDetailTab(t, key) {
  detailTab = t;
  const p = allProds.find(x => x._key === key);
  if (p) renderDetail(p);
}

  {key:'factory_addr_en', label:'工廠地址 (英文)', type:'text', full:true},

  {key:'gross_wt_ctn', label:'外箱毛重 (kg)', type:'number', full:false},
  {key:'shelf_life_m', label:'保存期限 (月)', type:'number', full:false},
  {key:'bbd_fmt', label:'效期格式', type:'text', full:false},
  {key:'storage', label:'儲存條件', type:'text', full:true},
  {key:'ingredients', label:'成分 (Ingredients %)', type:'textarea', full:true},

  {key:'alcohol_pct', label:'酒精含量 %', type:'number', full:false},
  {key:'hs_code', label:'HS Code', type:'text', full:false},
  {key:'import_reg', label:'進口報驗字號', type:'text', full:false},
  {key:'notes', label:'備註', type:'textarea', full:true},
];

function openEditModal(key) {
  if (!canEdit) return;
  editKey = key;
  const p = allProds.find(x => x._key === key);
  if (!p) return;
  const tech = p._tech;
  document.getElementById('modal-product-name').textContent = p['中文品名'] + ' ｜ ' + (p['英文品名'] || '') + ' ｜ ' + (p['供應商'] || '');
  const grid = document.getElementById('edit-form-grid');
  grid.innerHTML = EDIT_FIELDS.map(f => {
    const val = tech[f.key] !== null && tech[f.key] !== undefined ? tech[f.key] : '';
    const fullCls = f.full ? ' full' : '';
    if (f.type === 'textarea') {
      return `<div class="form-item${fullCls}"><label class="form-label">${f.label}</label><textarea id="ef_${f.key}" rows="3">${val}</textarea></div>`;
    }
    return `<div class="form-item${fullCls}"><label class="form-label">${f.label}</label><input type="${f.type}" id="ef_${f.key}" value="${String(val).replace(/"/g,'&quot;')}"></div>`;
  }).join('');
  document.getElementById('edit-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('edit-modal').classList.remove('open');
  editKey = null;
}

function saveModal() {
  if (!editKey) return;
  const changes = {};
  EDIT_FIELDS.forEach(f => {
    const el = document.getElementById('ef_'+f.key);
    if (!el) return;
    let val = el.value.trim();
    if (f.type === 'number') val = val === '' ? null : Number(val);
    changes[f.key] = val;
  });
  changes.last_updated = new Date().toISOString().slice(0,10);
  
  // Merge into localTech
  if (!localTech[editKey]) localTech[editKey] = {};
  Object.assign(localTech[editKey], changes);
  localStorage.setItem('gj_tech_overrides', JSON.stringify(localTech));
  
  // Update merged product
  const p = allProds.find(x => x._key === editKey);
  if (p) p._tech = getTech(editKey);
  
  closeModal();
  showToast();
  // Re-render
  renderList();
  if (selectedKey) {
    const p2 = allProds.find(x => x._key === selectedKey);
    if (p2) renderDetail(p2);
  }
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ============================================================
// EXPORT
// ============================================================
function exportJSON() {
  // Merge base TECH_RAW with localTech
  const merged = JSON.parse(JSON.stringify(TECH_RAW));
  Object.keys(localTech).forEach(k => {
    if (!merged[k]) merged[k] = {};
    Object.assign(merged[k], localTech[k]);
  });
  const blob = new Blob([JSON.stringify(merged, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `product_tech_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  showToast();
}

let supFiltered = [...SUPS];
let selectedSup = null;
let bankRevealed = false;

function applySupFilter() {
  const q = document.getElementById('sup-search').value.toLowerCase();
  const type = document.getElementById('sup-fil-type').value;
  supFiltered = SUPS.filter(s => {
    if (type && s.type !== type) return false;
    if (q) {
      const str = [s.name, s.country, s.contact, s.cat].join(' ').toLowerCase();
      if (!str.includes(q)) return false;
    }
    return true;
  });
  renderSupList();
  document.getElementById('sup-count-badge').textContent = `${supFiltered.length} 家供應商`;
}

function renderSupList() {
  const list = document.getElementById('sup-list');
  list.innerHTML = supFiltered.map((s,i) => {
    const sel = s.code === (selectedSup && selectedSup.code) ? ' selected' : '';
    const certOk = s.cert ? '🟢' : '⚪';
    return `<div class="sup-item${sel}" onclick="selectSup(${supFiltered.indexOf(s)})">
      <div class="sup-name">${s.name || '—'} <span style="font-size:10px;color:#9ca3af">${s.code}</span></div>
      <div class="sup-meta">${s.country || ''} ｜ ${s.type || ''} ｜ ${certOk} 認證 ｜ ${s.cnt||0} 產品</div>
    </div>`;
  }).join('');
}

function selectSup(idx) {
  selectedSup = supFiltered[idx];
  bankRevealed = false;
  // Update selected highlight
  document.querySelectorAll('.sup-item').forEach((el,i) => {
    el.classList.toggle('selected', i === idx);
  });
  renderSupDetail(selectedSup);
}

function renderSupDetail(s) {
  const det = document.getElementById('sup-detail');
  const editBtn = isAdmin ? `<button class="edit-btn" style="margin-top:8px" onclick="alert('供應商主檔編輯功能即將上線')">✏️ 編輯</button>` : '';
  
  const infoRow = (label, val) => {

      <div class="info-grid">

    bankSection = `
      <div class="section-title">💳 財務資訊 <button class="bank-reveal-btn" onclick="toggleBank()">${bankRevealed?'隱藏':'顯示'}</button></div>
      <div id="bank-data" style="${bankRevealed?'':'filter:blur(5px);user-select:none'}">${bankData}</div>`;
  }

  det.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div>
        <div style="font-size:18px;font-weight:800;color:var(--green)">${s.name}</div>
        <div style="font-size:12px;color:#6b7280;margin-top:3px">${s.code} ｜ ${s.type||''} ｜ ${s.country||''}</div>
      </div>
      ${editBtn}
    </div>
    
    <div class="section-title">📋 基本資訊</div>
    <div class="info-grid">
      ${infoRow('產品類別', s.cat)}
      ${infoRow('產品筆數', s.cnt ? s.cnt + ' 筆' : null)}
      ${infoRow('生產國/地區', s.country)}
      ${infoRow('幣別', s.currency)}
      ${infoRow('合作模式', s.coop)}
      ${infoRow('付款條件', s.payment)}
      ${infoRow('報價條件', s.quote_term)}
      ${infoRow('適用通路', s.channels)}
      ${infoRow('最近價格更新', s.price_updated)}
    </div>
    
    <div class="section-title">👤 聯絡資訊</div>
    <div class="info-grid">
      ${infoRow('主要聯絡人', s.contact)}
      ${infoRow('職稱', s.title)}
      ${infoRow('Email', s.email ? `<a href="mailto:${s.email}" style="color:var(--teal)">${s.email}</a>` : null)}
      ${infoRow('電話', s.phone)}
      ${infoRow('WhatsApp/Line', s.whatsapp)}
      ${infoRow('地址', s.address)}
      ${infoRow('官方網站', s.website ? `<a href="${s.website}" target="_blank" style="color:var(--teal)">${s.website}</a>` : null)}
    </div>
    
    <div class="section-title">🏅 品質認證</div>
    <div class="info-grid">
      ${infoRow('認證', s.cert)}
      ${infoRow('有效期限', s.cert_exp)}

    ${bankSection}
    
    ${s.notes ? `<div class="section-title">📝 備註</div><div style="font-size:12px;line-height:1.6">${s.notes}</div>` : ''}`;
}

function toggleBank() {
  bankRevealed = !bankRevealed;
  if (selectedSup) renderSupDetail(selectedSup);
}

  document.querySelectorAll('.content').forEach(el => el.classList.remove('active'));

}

function openPdfModal() {
  // Populate supplier dropdown
  const sel = document.getElementById('pdf-sup-sel');
  const suppliers = [...new Set(PRODS.map(p => p['供應商']).filter(Boolean))].sort();
  sel.innerHTML = '<option value="">— 請選擇供應商 —</option>' +
    suppliers.map(s => `<option value="${s}">${s}</option>`).join('');

  // Build field checkboxes
  const grid = document.getElementById('pdf-fields-grid');
  grid.innerHTML = PDF_FIELDS.map(f => `
    <label class="pdf-field-chk">
      <input type="checkbox" id="pf_${f.key}" ${f.default ? 'checked' : ''}>
      ${f.label} <span>${f.en}</span>
    </label>`).join('');

  document.getElementById('pdf-modal').classList.add('open');
}

function closePdfModal() {
  document.getElementById('pdf-modal').classList.remove('open');
}

function loadPdfProds() {
  const sup = document.getElementById('pdf-sup-sel').value;
  const listEl = document.getElementById('pdf-prod-list');
  const genBtn = document.getElementById('pdf-gen-btn');
  if (!sup) {
    listEl.innerHTML = '<div class="pdf-no-prod">請先選擇供應商</div>';
    genBtn.disabled = true;
    return;
  }
  const items = PRODS.filter(p => p['供應商'] === sup);
  listEl.innerHTML = items.map((p,i) => `
    <label class="pdf-prod-item">
      <input type="checkbox" class="pdf-prod-chk" value="${i}" data-ean="${p['EAN']||''}" checked onchange="updatePdfBtn()">
      <div>
        <div class="pdf-prod-name">${p['中文品名']||'—'}</div>
        <div class="pdf-prod-spec">${p['英文品名']||''} ${p['規格']?'· '+p['規格']:''}</div>
        <div class="pdf-prod-ean">EAN: ${p['EAN']||'—'}</div>
      </div>
    </label>`).join('');
  // Store filtered list for later
  listEl._prods = items;
  updatePdfBtn();
}

function updatePdfBtn() {
  const checked = document.querySelectorAll('.pdf-prod-chk:checked').length;
  document.getElementById('pdf-gen-btn').disabled = checked === 0;
}

function pdfToggleAll() {
  const boxes = document.querySelectorAll('.pdf-prod-chk');
  if (!boxes.length) return;
  const allChecked = [...boxes].every(b => b.checked);
  boxes.forEach(b => { b.checked = !allChecked; });
  updatePdfBtn();
}

function getFieldVal(prod, techRec, fieldKey) {
  if (!techRec && ['ingredients','ingredients_zh','allergens','shelf_life_m','bbd_fmt',
    'carton_dim','manufacturer_en','factory_addr_en','storage','alcohol_pct','certs','hs_code'].includes(fieldKey)) {
    return null;
  }
  if (fieldKey === 'EAN') return prod['EAN'] || null;
  if (fieldKey === '規格') return prod['規格'] || null;
  if (fieldKey === '箱入數') return prod['箱入數'] ? prod['箱入數'] + ' 個/箱' : null;
  if (fieldKey === '生產國') return prod['生產國'] || null;
  if (fieldKey === 'shelf_life_m') return techRec && techRec.shelf_life_m ? techRec.shelf_life_m + ' 個月' : null;
  if (fieldKey === 'alcohol_pct') {
    if (!techRec) return null;
    const v = techRec.alcohol_pct;
    return (v !== null && v !== undefined && v !== '') ? v + '%' : null;
  }
  if (fieldKey === 'certs') {
    if (!techRec || !techRec.certs || !techRec.certs.length) return null;
    return Array.isArray(techRec.certs) ? techRec.certs.join(', ') : techRec.certs;
  }
  return techRec ? (techRec[fieldKey] || null) : null;
}

function generatePdf() {
  const listEl = document.getElementById('pdf-prod-list');
  const prods = listEl._prods || [];
  const checked = [...document.querySelectorAll('.pdf-prod-chk:checked')].map(b => parseInt(b.value));
  const selectedProds = checked.map(i => prods[i]);

  const selFields = PDF_FIELDS.filter(f => {
    const el = document.getElementById('pf_' + f.key);
    return el && el.checked;
  });

  const sup = document.getElementById('pdf-sup-sel').value;
  const today = new Date().toLocaleDateString('zh-TW', {year:'numeric',month:'2-digit',day:'2-digit'});

  // Build product cards HTML
  const cards = selectedProds.map(prod => {
    const ean = (prod['EAN'] || '').replace(/\s/g,'');
    const techRec = TECH_RAW[ean] || TECH_RAW[prod['EAN']] || null;

    const rows = selFields.map(f => {
      const val = getFieldVal(prod, techRec, f.key);
      if (!val && val !== 0) return '';
      return `<tr>
        <td class="fl-cell">${f.label}<br><span class="fl-en">${f.en}</span></td>
        <td class="fv-cell">${String(val).replace(/\n/g,'<br>')}</td>
      </tr>`;
    }).filter(Boolean).join('');

    return `<div class="prod-card">
      <div class="prod-card-head">
        <div class="prod-cn">${prod['中文品名']||'—'}</div>
        <div class="prod-en">${prod['英文品名']||''}</div>
      </div>
      <table class="data-tbl">
        <tbody>${rows || '<tr><td colspan="2" style="color:#9ca3af;font-size:11px;padding:8px">（無選取資料）</td></tr>'}</tbody>
      </table>
    </div>`;
  }).join('');

  const printHTML = `<!DOCTYPE html>

  <img class="logo" src="${LOGO_B64}">

  </div>
  <div class="doc-title">
    <h1>產品技術資料</h1>
    <div class="doc-meta">供應商：${sup} ｜ 日期：${today} ｜ 共 ${selectedProds.length} 筆</div>
  </div>

${cards}

  const win = window.open('', '_blank');
  win.document.write(printHTML);
  win.document.close();
}
