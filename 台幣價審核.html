let onlyChanged=false;
const tb=document.getElementById('tb');
function mgClass(m){return m==null?'':(m<10?'mg-lo':(m<20?'mg-mid':'mg-ok'));}
function render(){
  const q=document.getElementById('q').value.trim().toLowerCase();
  tb.innerHTML='';
  D.forEach((d,i)=>{
    if(onlyChanged && !d.changed && !q) return;
    if(q && !((d.name||'').toLowerCase().includes(q)||(d.supplier||'').toLowerCase().includes(q)||String(d.ean).includes(q))) return;
    const tag=d.supplier=='Feast'?'tF':(d.supplier=='Europastry'?'tE':'tV');
    const mg=d.cur_margin;
    tb.insertAdjacentHTML('beforeend',`<tr class="${d.changed?'changed':''}">
     <td><input type="checkbox" class="chk" data-i="${i}" ${d.changed?'':'disabled title=非公式變動,如要改請填修正值'}></td>
     <td class="l"><span class="tag ${tag}">${d.supplier}</span></td>
     <td class="l">${d.name}</td>
     <td>${d.cur_total.toFixed(2)}</td>
     <td>${d.cur_min.toFixed(2)}</td>
     <td class="mg ${mgClass(mg)}">${mg==null?'—':mg+'%'}</td>
     <td>${d.proposed!=null?d.proposed.toFixed(2):'—'}</td>
     <td><input type="number" step="0.01" class="fix" data-i="${i}" oninput="liveMg(${i})" placeholder=""></td>
     <td class="live" id="lm${i}">—</td>
     <td class="l src-${d.source}">${d.source}</td></tr>`);
  });
  upd();
}
function liveMg(i){
  const v=parseFloat(document.querySelector(`.fix[data-i="${i}"]`).value);
  const cell=document.getElementById('lm'+i);
  if(isNaN(v)||v<=0){cell.textContent='—';return;}
  const m=((v-D[i].cur_total)/v*100).toFixed(1);
  cell.textContent=m+'%';
  cell.className='live '+mgClass(parseFloat(m));
}
function toggleFilter(){onlyChanged=!onlyChanged;document.getElementById('tFilter').classList.toggle('on',onlyChanged);
  document.getElementById('tFilter').textContent=onlyChanged?'只看有變動':'顯示全部';render();}
function allV(){document.querySelectorAll('.chk:not(:disabled)').forEach(c=>c.checked=true);upd();}
function upd(){const n=document.querySelectorAll('.chk:checked').length;
  const f=[...document.querySelectorAll('.fix')].filter(x=>x.value!=='').length;
  document.getElementById('cnt').textContent=`已核准 ${n}　手動填 ${f}`;}
document.addEventListener('change',upd);
function exportJSON(){
  const out=[];
  D.forEach((d,i)=>{
    const chkEl=document.querySelector(`.chk[data-i="${i}"]`);
    const fixEl=document.querySelector(`.fix[data-i="${i}"]`);
    if(!chkEl)return;
    const chk=chkEl.checked, fix=fixEl.value;
    if(fix!==''){
      out.push({ean:d.ean,name:d.name,supplier:d.supplier,approved_min:parseFloat(fix),
        new_total:d.cur_total,new_floor:+(d.cur_total*1.1).toFixed(2),corrected:true});
    }else if(chk && d.proposed!=null){
      out.push({ean:d.ean,name:d.name,supplier:d.supplier,approved_min:d.proposed,
        new_total:d.cur_total,new_floor:+(d.cur_total*1.1).toFixed(2),corrected:false});
    }
  });
  if(!out.length){alert('沒有核准或手動填任何項目');return;}
  const blob=new Blob([JSON.stringify(out,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='台幣核准_20260607_0836.json';a.click();
  alert('已匯出 '+out.length+' 筆，交給 Claude 執行 apply_twd.py');
}
render();
</script></body></html>
